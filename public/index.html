<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#7c3aed">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="Remote chat interface for Antigravity AI">
    <title>Antigravity Connect</title>
    <link rel="manifest" href="/manifest.json?v=2">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css?v=11">
    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- morphdom for flicker-free DOM diffing -->
    <script src="https://cdn.jsdelivr.net/npm/morphdom@2.6.2/dist/morphdom-umd.min.js"></script>
    <script>
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            const el = document.querySelector('.loading-state p');
            if (el) el.textContent = `FATAL: ${msg} at ${lineNo}:${columnNo}`;
            return false;
        };
        window.addEventListener('unhandledrejection', function(event) {
            const el = document.querySelector('.loading-state p');
            if (el) el.textContent = `PROMISE REJECTED: ${event.reason}`;
        });
    </script>
</head>

<body>
    <header class="header">
        <div class="header-top">
            <h1>
                <span id="headerTitle">Antigravity Connect</span>
            </h1>
            <div class="header-controls">
                <!-- Keep existing controls -->
                <button class="new-chat-btn" id="newChatBtn" aria-label="New Chat" title="New Chat (Ctrl+Shift+L)">
                    <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                </button>
                <button class="artifacts-btn" id="artifactsBtn" aria-label="Artifacts" title="View Artifacts">
                    <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                        <line x1="16" y1="13" x2="8" y2="13"/>
                        <line x1="16" y1="17" x2="8" y2="17"/>
                    </svg>
                </button>
                <button class="history-btn" id="historyBtn" aria-label="Chat History" title="Past Conversations">
                    <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <polyline points="12 6 12 12 16 14"></polyline>
                    </svg>
                </button>

                <button class="refresh-btn" id="refreshBtn" aria-label="Refresh">
                    <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M23 4v6h-6"></path>
                        <path d="M1 20v-6h6"></path>
                        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                    </svg>
                </button>
                <div class="status-badge">
                    <div class="status-dot disconnected" id="statusDot"></div>
                </div>
            </div>
        </div>
        
        <!-- Project Selector Zone -->
        <div class="project-selector" id="projectSelectorBtn">
            <div class="project-info">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="project-icon">
                    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                </svg>
                <span id="currentProjectName" class="project-name">Select Project</span>
                <span id="currentProjectStatus" class="project-status">Connecting...</span>
            </div>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" class="chevron-down" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
        </div>
    </header>

    <!-- Settings Bar -->
    <div class="settings-bar">
        <div class="setting-chip" id="modeBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />
            </svg>
            <span id="modeText">Fast</span>
        </div>
        <div class="setting-chip" id="modelBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10" />
                <path d="M12 16v-4" />
                <path d="M12 8h.01" />
            </svg>
            <span id="modelText">Select Model</span>
        </div>
        <div class="setting-chip" id="ttsBtn" title="Lecture audio automatique du dernier message">
            <svg id="ttsIconOn" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
            </svg>
            <svg id="ttsIconOff" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none; opacity:0.6;">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                <line x1="23" y1="9" x2="17" y2="15"></line>
                <line x1="17" y1="9" x2="23" y2="15"></line>
            </svg>
            <span id="ttsText">TTS On</span>
        </div>
        <div class="setting-chip" id="syncStats" style="cursor: default; border: none; background: transparent;">
            <span id="statsText" style="font-size: 10px; opacity: 0.6;">Syncing...</span>
        </div>
    </div>

    <!-- SSL Banner (shown when running HTTP) -->
    <div class="ssl-banner" id="sslBanner" style="display: none;">
        <span>⚠️ Not Secure - Running on HTTP</span>
        <button id="enableHttpsBtn" onclick="enableHttps()">Enable HTTPS</button>
        <button class="dismiss-btn" onclick="dismissSslBanner()">×</button>
    </div>

    <!-- Chat Container -->
    <div class="chat-container" id="chatContainer">
        <div class="chat-content" id="chatContent">
            <div class="loading-state">
                <div class="loading-spinner"></div>
                <p>Waiting for snapshot...</p>
            </div>
        </div>
    </div>

    <!-- Scroll to Bottom FAB -->
    <button class="fab" id="scrollToBottom" aria-label="Scroll to bottom">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M12 5v14M19 12l-7 7-7-7" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
    </button>

    <!-- Input Section -->
    <div class="input-section">
        <div class="input-wrapper">
            <textarea id="messageInput" placeholder="Message..." rows="1"></textarea>

            <button class="icon-btn tooltip-trigger" id="workflowBtn" aria-label="Workflows" style="padding: 8px; margin-right: 2px;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
                </svg>
            </button>

            <button class="send-btn" id="sendBtn" aria-label="Send">
                <svg viewBox="0 0 24 24">
                    <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"
                        style="fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;" />
                </svg>
            </button>
        </div>
    </div>

    <!-- Modals -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-panel" id="modalPanel">
            <div class="modal-title" id="modalTitle">Select Option</div>
            
            <!-- Specific section for Project List (hidden by default unless modalTitle is Projects) -->
            <div id="projectSearchContainer" style="display:none; margin-bottom: 15px;">
                <input type="text" id="projectSearchInput" class="project-search-input" placeholder="Search projects..." />
            </div>

            <div id="modalList"></div>
            
            <div style="margin-top:20px; text-align:center;">
                <button onclick="closeModal()"
                    style="background:transparent; border:none; color:var(--text-muted); padding:10px;">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Projects Layer (Full Screen for Phone) - Dedicated UI for projects -->
    <div class="history-layer" id="projectsLayer">
        <div class="history-header">
            <button class="icon-btn" onclick="hideProjects()" aria-label="Back">
                <svg viewBox="0 0 24 24" width="24" height="24">
                    <path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </button>
            <h2>Workspaces</h2>
            <button class="icon-btn" onclick="openNewWorkspace()" aria-label="Open New">
                <svg viewBox="0 0 24 24" width="20" height="20">
                    <line x1="12" y1="5" x2="12" y2="19" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                    <line x1="5" y1="12" x2="19" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                </svg>
            </button>
        </div>
        <div class="project-search-bar" style="padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--bg-panel);">
             <input type="text" id="projectSearchField" placeholder="Search projects..." style="width: 100%; padding: 10px 14px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg-input); color: white; outline: none;">
        </div>
        <div class="history-content" id="projectsList" style="padding: 16px;">
            <!-- Project items injected here -->
            <div class="loading-state">
                <div class="loading-spinner"></div>
                <p>Loading workspaces...</p>
            </div>
        </div>
    </div>

    <!-- History Layer (Full Screen) -->
    <div class="history-layer" id="historyLayer">
        <div class="history-header">
            <button class="icon-btn" onclick="hideChatHistory()" aria-label="Back">
                <svg viewBox="0 0 24 24" width="24" height="24">
                    <path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </button>
            <h2>Conversations</h2>
            <div style="width: 24px;"></div> <!-- Spacer -->
        </div>
        <!-- Search Bar -->
        <div class="project-search-bar" style="padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--bg-panel);">
            <input type="text" id="historySearchField" placeholder="Search conversations..." style="width: 100%; padding: 10px 14px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg-input); color: white; outline: none;">
        </div>
        <div class="history-content" id="historyList">
            <!-- Items injected here -->
        </div>
    </div>

    <!-- Artifacts Layer (Full Screen) -->
    <div class="history-layer" id="artifactsLayer">
        <div class="history-header">
            <button class="icon-btn" onclick="hideArtifacts()" aria-label="Back">
                <svg viewBox="0 0 24 24" width="24" height="24">
                    <path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
            </button>
            <h2>Artifacts</h2>
            <div style="width: 24px;"></div>
        </div>
        <div class="history-content" id="artifactsList" style="padding: 12px;">
            <div class="loading-state">
                <div class="loading-spinner"></div>
                <p>Loading artifacts...</p>
            </div>
        </div>
    </div>

    <!-- Artifact Viewer (Half-screen overlay) -->
    <div class="artifact-viewer" id="artifactViewer">
        <div class="artifact-viewer-header">
            <button class="icon-btn" id="artifactViewerClose" aria-label="Close">
                <svg viewBox="0 0 24 24" width="20" height="20">
                    <path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
            </button>
            <span class="artifact-viewer-title" id="artifactViewerTitle">Artifact</span>
            <button class="send-comments-btn" id="sendCommentsBtn" style="display:none;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
                Send Comments
            </button>
            <button class="artifact-proceed-btn" id="artifactProceedBtn" style="display:none;">Proceed</button>
        </div>
        <div class="artifact-viewer-body" id="artifactViewerContent">
        </div>
    </div>

    <script type="module" src="/js/main.js?v=22"></script>

    <!-- PWA: Service Worker Registration & Install Banner -->
    <div id="installBanner" style="display:none; position:fixed; bottom:80px; left:50%; transform:translateX(-50%); z-index:9999; background:linear-gradient(135deg, #7c3aed, #6d28d9); color:#fff; padding:12px 20px; border-radius:16px; box-shadow:0 8px 32px rgba(124,58,237,0.4); font-family:'Inter',sans-serif; font-size:14px; font-weight:500; cursor:pointer; display:none; align-items:center; gap:10px; animation:slideUpBanner .4s ease-out;">
        <span>📲 Install Antigravity Connect</span>
        <button id="installBtn" style="background:#fff; color:#7c3aed; border:none; border-radius:10px; padding:6px 14px; font-weight:600; font-size:13px; cursor:pointer;">Install</button>
        <button id="dismissInstall" style="background:transparent; border:none; color:rgba(255,255,255,0.7); font-size:18px; cursor:pointer; padding:0 4px;">×</button>
    </div>
    <style>
        @keyframes slideUpBanner { from { opacity:0; transform:translateX(-50%) translateY(20px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
    </style>
    <script>
        // Service Worker registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js?v=11')
                    .then(reg => console.log('[PWA] SW registered, scope:', reg.scope))
                    .catch(err => console.warn('[PWA] SW registration failed:', err));
            });
            
            // Reload when a new ServiceWorker takes control
            let refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (!refreshing) {
                    refreshing = true;
                    console.log('[PWA] New service worker activated. Reloading page...');
                    window.location.reload();
                }
            });
        }

        // Install prompt
        let deferredPrompt = null;
        const installBanner = document.getElementById('installBanner');
        const installBtn = document.getElementById('installBtn');
        const dismissBtn = document.getElementById('dismissInstall');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBanner.style.display = 'flex';
        });

        installBtn.addEventListener('click', async () => {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            console.log('[PWA] Install outcome:', outcome);
            deferredPrompt = null;
            installBanner.style.display = 'none';
        });

        dismissBtn.addEventListener('click', () => {
            installBanner.style.display = 'none';
        });

        window.addEventListener('appinstalled', () => {
            installBanner.style.display = 'none';
            console.log('[PWA] App installed successfully');
        });
    </script>
</body>

</html>
